<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pz7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pz7</h1>
        
        <div id="loading" style="text-align: center; color: #007BFF; font-weight: bold; margin-bottom: 10px; display: none;">Завантаження з БД...</div>
        <div id="error" style="text-align: center; color: #dc3545; font-weight: bold; margin-bottom: 10px; display: none;"></div>

        <div class="counters">
            <span>Загалом справ: <b id="total-count">0</b></span> |
            <span>Незроблених: <b id="unchecked-count">0</b></span>
        </div>

        <button onclick="newTodo()">Додати нову справу</button>
        
        <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
